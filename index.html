<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Compass AI</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">

        <h1>Career Compass AI</h1>

        <p>
            Discover your personalized career roadmap with AI guidance.
        </p>

        <div class="form-card">

            <input
                type="text"
                id="name"
                placeholder="Enter Your Name"
            >

            <select id="career">
                <option value="">Select Career Goal</option>
                <option>Data Analyst</option>
                <option>Data Scientist</option>
                <option>Java Developer</option>
                <option>Full Stack Developer</option>
                <option>AI Engineer</option>
                <option>Cyber Security Analyst</option>
            </select>

            <select id="level">
                <option value="">Current Skill Level</option>
                <option>Beginner</option>
                <option>Intermediate</option>
                <option>Advanced</option>
            </select>

            <input
                type="number"
                id="hours"
                placeholder="Hours Available Per Day"
            >

            <button id="generateBtn">
                Generate Roadmap
            </button>

        </div>

    </div>

    <script src="js/app.js"></script>

</body>
</html>
